<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CallGrid Ping Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef2f7, #d9e4f5);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      width: 420px;
      background: #fff;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      font-size: 22px;
      margin-bottom: 20px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      font-size: 14px;
    }

    input:focus {
      border-color: #007bff;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      transition: 0.2s;
    }

    button:hover {
      background: #0056b3;
    }

    .card {
      margin-top: 20px;
      background: #f8fafc;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
    }

    .row {
      margin-bottom: 10px;
      font-size: 14px;
    }

    .label {
      font-weight: bold;
      color: #555;
    }

    .value {
      margin-top: 3px;
      color: #222;
    }

    .status {
      font-weight: bold;
      padding: 4px 10px;
      border-radius: 6px;
      display: inline-block;
    }

    .yes {
      background: #d1fae5;
      color: #065f46;
    }

    .no {
      background: #fee2e2;
      color: #991b1b;
    }

    .loading {
      text-align: center;
      margin-top: 10px;
      color: #555;
    }

    .error {
      color: red;
      text-align: center;
      margin-top: 10px;
    }

    @media (max-width: 500px) {
      .container {
        width: 90%;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>📞 CallGrid Ping</h1>

    <input id="callerId" placeholder="Enter Caller ID (e.g. 5551234567)" />

    <button onclick="sendPing()">Check Availability</button>

    <div id="loading" class="loading"></div>
    <div id="error" class="error"></div>

    <div id="result"></div>
  </div>

  <script>
    async function sendPing() {
      const callerId = document.getElementById("callerId").value.trim();
      const result = document.getElementById("result");
      const loading = document.getElementById("loading");
      const error = document.getElementById("error");

      result.innerHTML = "";
      error.textContent = "";

      if (!callerId) {
        error.textContent = "Please enter a Caller ID";
        return;
      }

      loading.textContent = "Checking...";

      try {
        const res = await fetch("/api/ping", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ callerId })
        });

        const text = await res.text();

        let data;
        try {
          data = JSON.parse(text);
        } catch {
          throw new Error("Server returned invalid response: " + text);
        }

        if (!data.success) {
          throw new Error(data.error || "Request failed");
        }

        const d = data.data;

        result.innerHTML = `
          <div class="card">
            <div class="row">
              <div class="label">Request ID</div>
              <div class="value">${d.id}</div>
            </div>

            <div class="row">
              <div class="label">Phone Number</div>
              <div class="value">${d.phoneNumber}</div>
            </div>

            <div class="row">
              <div class="label">Status Code</div>
              <div class="value">${d.code}</div>
            </div>

            <div class="row">
              <div class="label">Available</div>
              <div class="value">
                <span class="status ${d.available ? "yes" : "no"}">
                  ${d.available ? "YES ✅" : "NO ❌"}
                </span>
              </div>
            </div>
          </div>
        `;

      } catch (err) {
        error.textContent = err.message;
      } finally {
        loading.textContent = "";
      }
    }
  </script>

</body>
</html>
